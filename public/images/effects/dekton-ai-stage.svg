    <linearGradient id="redHot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff812c"/>
      <stop offset=".48" stop-color="#ef2629"/>
      <stop offset="1" stop-color="#a70f16"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
