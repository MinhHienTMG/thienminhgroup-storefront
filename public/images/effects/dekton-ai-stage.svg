      <stop offset="0" stop-color="#fff6f0"/>
      <stop offset=".34" stop-color="#f4faf7"/>
      <stop offset=".72" stop-color="#cfe3e1"/>
      <stop offset="1" stop-color="#fff1f1"/>
    </linearGradient>
    <radialGradient id="sun" cx="20%" cy="22%" r="40%">
      <stop offset="0" stop-color="#ffd36f" stop-opacity=".85"/>
      <stop offset=".42" stop-color="#ff7a2b" stop-opacity=".34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="68%" cy="42%" r="48%">
      <stop offset="0" stop-color="#13201f" stop-opacity=".9"/>
      <stop offset=".38" stop-color="#0b7046" stop-opacity=".55"/>
      <stop offset=".68" stop-color="#d71920" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
